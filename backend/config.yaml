server:
    host: 0.0.0.0
    port: 65000
    workers: 1
    timezone_offset: 8
database:
    url: postgresql://postgres:Htwy%402026@127.0.0.1:5432/liteapi?sslmode=disable
    pool_size: 20
    max_overflow: 10
    pool_recycle: 3600
security:
    admin_token: sk-lite-admin-token
    secret_key: lite_api_secret_key_change_me_1234567890ab
    jwt_expire_hours: 5
    cors_origins: ""
proxy:
    timeout: 120
    max_connections: 1000
    max_keepalive: 100
    keepalive_expiry: 30
    retry_count: 1
cache:
    enabled: true
    ttl: 30
    max_entries: 10000
log:
    batch_size: 50
    batch_interval: 5
    retention_days: 90
    cleanup_interval_hours: 6
    cleanup_batch_size: 5000
    error_max_entries: 10000
    error_max_days: 30
registration:
    allow_register: true
    default_max_tokens: 2
    default_token_quota: 5000
    default_group: Default
    min_password_length: 8
heartbeat:
    enabled: true
    interval: 60
    timeout: 10
    retries: 3
